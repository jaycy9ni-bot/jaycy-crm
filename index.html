  _i:null,_o:null,_t:'home',_f:'all',

  addInq(){let d={firstInquiryDate:(new Date()).toISOString().split('T')[0],wechatName:'',plannedTravelDate:'',days:'',people:'',interestedPackage:'',status:'',intentionLevel:'中',followUp1:'',followUp2:'',followUp3:''};this.editInq(d,null,true)},

    document.getElementById('ob').innerHTML=h;document.getElementById('ov').classList.add('on');
  },
  
  saveInq(id,isNew){
    let d={id:id||'inq_'+Date.now(),firstInquiryDate:document.getElementById('_firstInquiryDate').value,wechatName:document.getElementById('_wechatName').value,plannedTravelDate:document.getElementById('_plannedTravelDate').value,days:document.getElementById('_days').value,people:document.getElementById('_people').value,interestedPackage:document.getElementById('_interestedPackage').value,status:document.getElementById('_status').value,intentionLevel:document.getElementById('_intentionLevel').value,followUp1:document.getElementById('_followUp1').value,followUp2:document.getElementById('_followUp2').value,followUp3:document.getElementById('_followUp3').value};
    if(!d.wechatName){this.tm('请填微信名');return}
    let idx=this.i.findIndex(function(a){return a.id===id});
    if(idx>=0)this.i[idx]=d;else this.i.unshift(d);
    this.saveI();this.cl();this.tab(this._t);this.tm('已保存');
  },
  
  saveI(){let v=this._i;this.i=v;if(this._t=='inquiries')this.inq();if(this._t=='home')this.home()},
  
  delInq(id){if(!confirm('删除?'))return;this.i=this.i.filter(function(a){return a.id!==id});this.saveI();this.cl();this.tab(this._t);this.tm('已删除')},
  
  editOrd(d,id,isNew){

    h+='<div class="ed"><span class="el">出行日期</span><input class="ei" id="_travelDate" value="'+this.es(d.travelDate)+'"></div>';

    h+='<div class="ed"><span class="el">房型</span><input class="ei" id="_roomType" value="'+this.es(d.roomType)+'"></div>';
    h+='<div class="ed"><span class="el">付款方式</span><input class="ei" id="_paymentMethod" value="'+this.es(d.paymentMethod)+'"></div>';
    h+='<div class="ed"><span class="el">付款状态</span><input class="ei" id="_paymentStatus" value="'+this.es(d.paymentStatus)+'"></div>';

  saveOrd(id,isNew){

    if(!d.customerInfo){this.tm('请填客户信息');return}
    let idx=this.o.findIndex(function(a){return a.id===id});
    if(idx>=0)this.o[idx]=d;else this.o.unshift(d);
    this.saveO();this.cl();this.tab(this._t);this.tm('已保存');

  saveO(){let v=this._o;this.o=v;if(this._t=='orders')this.ord();if(this._t=='home')this.home()},
  delOrd(id){if(!confirm('删除?'))return;this.o=this.o.filter(function(a){return a.id!==id});this.saveO();this.cl();this.tab(this._t);this.tm('已删除')},
  
  inq(){
    let self=this;
    let s=(document.getElementById('_search')||{}).value||'';
    let f=this._f;
    let list=this.i.filter(function(x){
      if(f=='high'&&x.intentionLevel!='高')return false;
      if(f=='med'&&x.intentionLevel!='中')return false;
      if(f=='low'&&x.intentionLevel!='低')return false;
      let t=(x.wechatName+' '+x.plannedTravelDate+' '+x.interestedPackage+' '+x.status).toLowerCase();
      return t.indexOf(s.toLowerCase())>=0;
    });
    let h='<div class="qa"><div class="qb" onclick="A.addInq()">新增咨询</div><div class="qb" onclick="A.tab(\'paste\')">粘贴录入</div><div class="qb" onclick="A.tab(\'home\')">返回首页</div></div>';
    h+='<div class="sb"><input id="_search" placeholder="搜索微信名/套餐/状态" value="'+self.es(s)+'" oninput="A.inq()"></div>';
    h+='<div class="cg"><span class="ch'+(f=='all'?' on':'')+'" onclick="A.inqFilter(\'all\')">全部</span><span class="ch'+(f=='high'?' on':'')+'" onclick="A.inqFilter(\'high\')">高意向</span><span class="ch'+(f=='med'?' on':'')+'" onclick="A.inqFilter(\'med\')">中意向</span><span class="ch'+(f=='low'?' on':'')+'" onclick="A.inqFilter(\'low\')">低意向</span></div>';
    if(list.length==0)h+='<div class="em">没有咨询记录</div>';
    else{for(let x of list){let bc=x.intentionLevel=='高'?'bh':x.intentionLevel=='中'?'bm':'bl';h+='<div class="ri" onclick="A.showInq(\''+x.id+'\')"><div class="rr"><div class="rn">'+self.es(x.wechatName||'?')+'</div><span class="rb '+bc+'">'+x.intentionLevel+'意向</span></div><div class="rm">'+self.es(x.plannedTravelDate||'?')+' | '+self.es(x.interestedPackage||'?')+'</div></div>';}h+='</div>';}
    document.getElementById('main').innerHTML=h;
  },
  
  inqFilter(f){this._f=f;this.inq()},
  
  ord(){
    let self=this;
    let s=(document.getElementById('_search')||{}).value||'';
    let f=this._f;
    let list=this.o.filter(function(x){
      if(f=='done'&&x.orderStatus!='已完成')return false;
      if(f=='open'&&x.orderStatus!='未完成')return false;
      let t=(x.customerInfo+' '+x.product+' '+x.travelDate+' '+x.orderStatus+' '+x.contact).toLowerCase();
      return t.indexOf(s.toLowerCase())>=0;
    });
    let h='<div class="qa"><div class="qb" onclick="A.addOrd()">新增成单</div><div class="qb" onclick="A.tab(\'paste\')">粘贴录入</div><div class="qb" onclick="A.tab(\'home\')">返回首页</div></div>';
    h+='<div class="sb"><input id="_search" placeholder="搜索客户/产品/状态" value="'+self.es(s)+'" oninput="A.ord()"></div>';
    h+='<div class="cg"><span class="ch'+(f=='all'?' on':'')+'" onclick="A.ordFilter(\'all\')">全部</span><span class="ch'+(f=='done'?' on':'')+'" onclick="A.ordFilter(\'done\')">已完成</span><span class="ch'+(f=='open'?' on':'')+'" onclick="A.ordFilter(\'open\')">未完成</span></div>';
    if(list.length==0)h+='<div class="em">没有成单记录</div>';
    else{for(let x of list){let bc=x.orderStatus=='已完成'?'bd':'bo';h+='<div class="ri" onclick="A.showOrd(\''+x.id+'\')"><div class="rr"><div class="rn">'+self.es(x.customerInfo||'?')+'</div><span class="rb '+bc+'">'+x.orderStatus+'</span></div><div class="rm">'+self.es(x.travelDate||'?')+' | '+self.es(x.product||'?')+' | AUD '+self.es(x.totalPrice||'?')+'</div></div>';}h+='</div>';}
    document.getElementById('main').innerHTML=h;
  },
  
  ordFilter(f){this._f=f;this.ord()},
  
  ps(){
    let self=this;
    let h='<div class="cg"><span class="ch'+(this.pmode=='inquiry'?' on':'')+'" onclick="A.psMode(\'inquiry\')">粘贴咨询</span><span class="ch'+(this.pmode=='order'?' on':'')+'" onclick="A.psMode(\'order\')">粘贴成单</span></div>';
    h+='<div class="card"><textarea class="pa" id="_paste" placeholder="把客户消息粘贴到这里...\n\n例: 客户Mako 6月23-26去西澳 3人 粉湖两日游+波浪岩 等拼房"></textarea></div>';
    h+='<button class="btn bp" onclick="A.psParse()">识别并填入</button>';
    h+='<div id="_pr" class="hid mt"></div>';
    h+='<button class="btn bp hid mt" id="_psave" onclick="A.psSave()">确认保存</button>';
    document.getElementById('main').innerHTML=h;
    this.pdata=null;
  },
  
  psMode(m){this.pmode=m;this.ps()},
  
  psParse(){
    let text=document.getElementById('_paste').value.trim();
    if(!text){this.tm('请先粘贴文字');return}
    let d;
    if(this.pmode=='inquiry'){
      d={firstInquiryDate:(new Date()).toISOString().split('T')[0],wechatName:'',plannedTravelDate:'',days:'',people:'',interestedPackage:'',status:'',intentionLevel:'中',followUp1:text,followUp2:'',followUp3:''};
      let nm=text.match(/客户[:：]?([^，。\d]{2,20})/)||text.match(/([^，。\s]{2,20})(?:问|咨询|想)/);if(nm)d.wechatName=nm[1].trim();
      let dt=text.match(/(\d{1,2})月(\d{1,2})(?:日|号)?[-~～](\d{1,2})/);if(dt)d.plannedTravelDate=dt[1]+'.'+dt[2]+'-'+dt[3];
      if(!d.plannedTravelDate){let dt2=text.match(/(\d{1,2}[.\-/]\d{1,2})[-~～](\d{1,2})/);if(dt2)d.plannedTravelDate=dt2[1]+'-'+dt2[2]}
      if(!d.plannedTravelDate){let dt3=text.match(/(\d{1,2})月(\d{1,2})[日号]?/);if(dt3)d.plannedTravelDate=dt3[1]+'.'+dt3[2]}
      let pm=text.match(/(\d+)\s*[个]?\s*人/);if(pm)d.people=pm[1];
      let dm=text.match(/(\d+)\s*[个]?\s*天/);if(dm)d.days=dm[1];
      let pks=['粉湖超值','粉湖轻奢','粉湖','波浪岩','玛格丽特河','罗岛','全景七日','明星六日','浪漫五日','纯玩','轻松四日','一日游','两日游','三日游','四日游','五日游','六日游','七日游'];
      let fpk=[];for(let k of pks){if(text.indexOf(k)>=0&&!fpk.some(function(e){return e.indexOf(k)>=0}))fpk.push(k)}if(fpk.length)d.interestedPackage=fpk.join(' ');
      if(text.indexOf('意向很高')>=0||text.indexOf('本周付款')>=0||text.indexOf('付定金')>=0)d.intentionLevel='高';
      else if(text.indexOf('只是咨询')>=0||text.indexOf('无回复')>=0||text.indexOf('没回复')>=0)d.intentionLevel='低';
    }else{
      let td=(new Date()).toISOString().split('T')[0].replace(/-/g,'/');
      d={seq:this.o.length+1,handler:'Jaycy',orderStatus:'未完成',groupDate:td,travelDate:'',product:'',endDate:'',customerInfo:'',contact:'',people:'',roomType:'',totalPrice:'',paymentMethod:'',paymentStatus:'',finalDate:'',notes:text,review:''};
      let nm=text.match(/客户[:：]?([^，。\d]{2,20})/);if(nm)d.customerInfo=nm[1].trim();
      let ph=text.match(/(?:\+?86\s*)?1[3-9]\d{9}|\d{8,11}/);if(ph)d.contact=ph[0];
      let dt=text.match(/(\d{1,2})月(\d{1,2})(?:日|号)?[-~～](\d{1,2})/);if(dt)d.travelDate=dt[1]+'.'+dt[2]+'-'+dt[3];
      if(!d.travelDate){let dt2=text.match(/(\d{1,2}[.\-/]\d{1,2})[-~～](\d{1,2})/);if(dt2)d.travelDate=dt2[1]+'-'+dt2[2]}
      if(!d.travelDate){let dt3=text.match(/(\d{1,2})月(\d{1,2})[日号]?/);if(dt3)d.travelDate=dt3[1]+'.'+dt3[2]}
      let pks=['粉湖超值','粉湖轻奢','粉湖','波浪岩','玛格丽特河','罗岛','全景七日','明星六日','浪漫五日','纯玩','轻松四日','一日游','两日游','三日游','四日游','五日游','六日游','七日游'];
      let fpk=[];for(let k of pks){if(text.indexOf(k)>=0&&!fpk.some(function(e){return e.indexOf(k)>=0}))fpk.push(k)}if(fpk.length)d.product=fpk.join(' ');
      let pm=text.match(/(\d+)\s*[个]?\s*人/);if(pm)d.people=pm[1];
      let rm=text.match(/(大床房|双床房|单人间|三人房|拼房|大床|双床)/);if(rm)d.roomType=rm[1];
      let pr=text.match(/(\d{3,5})(?![\d.])\s*(?:AUD|澳币|元|块|刀|rmb)/i)||text.match(/(?:总价|价格||AUD|澳币)\s*(\d{3,5})/i);if(pr)d.totalPrice=pr[1];
      if(text.indexOf('微信')>=0)d.paymentMethod='微信转账';else if(text.indexOf('支付宝')>=0)d.paymentMethod='支付宝转账';else if(text.indexOf('澳币')>=0)d.paymentMethod='澳币转账';else if(text.indexOf('现金')>=0)d.paymentMethod='现金';else if(text.indexOf('携程')>=0)d.paymentMethod='携程';
      if(text.indexOf('已付全款')>=0||text.indexOf('全款支付')>=0)d.paymentStatus='全款支付';else if(text.indexOf('定金')>=0)d.paymentStatus='已付定金';else if(text.indexOf('尾款')>=0)d.paymentStatus='待付尾款';else if(text.indexOf('结清')>=0)d.paymentStatus='结清';
    }
    this.pdata=d;
    let h='<div class="card-title">识别结果</div>';
    let keys=this.pmode=='inquiry'?['wechatName:微信名','firstInquiryDate:首询日期','plannedTravelDate:出行日期','days:天数','people:人数','interestedPackage:套餐','status:状态','intentionLevel:意向']:['customerInfo:客户','contact:电话','travelDate:出行日期','product:产品','people:人数','totalPrice:总价','roomType:房型','paymentMethod:付款方式','paymentStatus:付款状态','orderStatus:订单状态'];
    for(let k of keys){let [key,label]=k.split(':');h+='<div class="pi"><span class="pl">'+label+'</span><span class="pv">'+A.es(d[key]||'-')+'</span></div>'}
    document.getElementById('_pr').innerHTML='<div class="pr">'+h+'</div>';document.getElementById('_pr').classList.remove('hid');document.getElementById('_psave').classList.remove('hid');
  },
  
  psSave(){
    if(!this.pdata){this.tm('请先识别');return}
    if(this.pmode=='inquiry'){this.pdata.id='inq_'+Date.now();this.i.unshift(this.pdata);this.saveI();this.tm('咨询已保存')}else{this.pdata.id='ord_'+Date.now();this.o.unshift(this.pdata);this.saveO();this.tm('成单已保存')}
    this.pdata=null;this.ps();
  },
  
  set(){
    let h='<div style="display:flex;justify-content:space-between;margin-bottom:16px"><b>设置</b><span class="ov-close" onclick="A.cl()">&times;</span></div>';
    h+='<button class="btn bs mt" onclick="A.expInq()">导出咨询表('+this.i.length+'条)</button>';
    h+='<button class="btn bs mt" onclick="A.expOrd()">导出成单表('+this.o.length+'条)</button>';
    h+='<button class="btn bs mt" onclick="A.expAll()">备份全部数据</button>';
    h+='<button class="btn bdg mt" onclick="A.clr()">清空所有数据</button>';
    document.getElementById('ob').innerHTML=h;document.getElementById('ov').classList.add('on');
  },
  
  expInq(){let csv='\uFEFF首询日期,微信名,出行日期,天数,人数,套餐,状态,意向,跟进1,跟进2,跟进3\n';for(let x of this.i)csv+=[x.firstInquiryDate,x.wechatName,x.plannedTravelDate,x.days,x.people,x.interestedPackage,x.status,x.intentionLevel,x.followUp1,x.followUp2,x.followUp3].map(function(c){return'"'+String(c||'').replace(/"/g,'""')+'"'}).join(',')+'\n';this.dl('咨询表.csv',csv);this.tm('导出'+this.i.length+'条')},
  expOrd(){let csv='\uFEFF序号,接单号,状态,拉群日期,出行日期,产品,结束日期,客户,电话,人数,房型,总价,付款方式,付款状态,尾款日期,备注,评价\n';for(let x of this.o)csv+=[x.seq,x.handler,x.orderStatus,x.groupDate,x.travelDate,x.product,x.endDate,x.customerInfo,x.contact,x.people,x.roomType,x.totalPrice,x.paymentMethod,x.paymentStatus,x.finalDate,x.notes,x.review].map(function(c){return'"'+String(c||'').replace(/"/g,'""')+'"'}).join(',')+'\n';this.dl('成单表.csv',csv);this.tm('导出'+this.o.length+'条')},
  expAll(){let d=JSON.stringify({i:this.i,o:this.o},null,2);this.dl('backup.json',d);this.tm('备份完成')},
  dl(n,c){let b=new Blob([c],{type:'text/csv;charset=utf-8'});let a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=n;document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(a.href)},
  clr(){if(confirm('确定清空所有数据？不可恢复！')){this.i=[];this.o=[];this.tab('home');this.tm('已清空')}},
};
A.tab('home');
</script></body></html>
