<!DOCTYPE html><html lang="zh-CN"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Jaycy AI CRM</title>
<style>
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #f8fafc; color: #1e293b; height: 100%; }
#app { height: 100%; display: flex; flex-direction: column; max-width: 480px; margin: 0 auto; }
header { background: #0d9488; color: #fff; padding: calc(12px + env(safe-area-inset-top)) 16px 12px; display: flex; align-items: center; flex-shrink: 0; }
header h1 { font-size: 17px; margin: 0; font-weight: 600; flex: 1; text-align: center; }
#_sync { font-size: 12px; color: #e0f2fe; cursor: pointer; }
#main { flex: 1; overflow-y: auto; padding: 12px 12px calc(80px + env(safe-area-inset-bottom)); }
nav { border-top: 1px solid #e2e8f0; display: flex; background: #fff; padding: 8px 0 calc(8px + env(safe-area-inset-bottom)); position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; z-index: 10; }
.nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 2px; padding: 6px 0; color: #94a3b8; font-size: 11px; cursor: pointer; }
.nav-item.active { color: #0d9488; }
.card { background: #fff; border-radius: 16px; padding: 16px; box-shadow: 0 1px 3px rgba(0,0,0,.1); margin-bottom: 12px; }
.card-title { font-size: 15px; font-weight: 600; margin: 0 0 12px; display: flex; align-items: center; justify-content: space-between; }
.img-up { border: 2px dashed #cbd5e1; border-radius: 12px; padding: 14px; text-align: center; color: #64748b; font-size: 14px; margin-top: 10px; cursor: pointer; background: #f8fafc; }
.img-up:active { background: #e2e8f0; }
.img-preview { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
.img-thumb { width: 72px; height: 72px; border-radius: 8px; overflow: hidden; position: relative; border: 1px solid #e2e8f0; background: #f1f5f9; }
.img-thumb img { width: 100%; height: 100%; object-fit: cover; }
.img-thumb .img-status { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.6); color: #fff; font-size: 10px; padding: 2px 4px; text-align: center; }
.img-error { color: #ef4444; font-size: 13px; margin-top: 8px; }
.ocr-status { font-size: 12px; color: #0d9488; margin-top: 8px; display: flex; align-items: center; gap: 6px; }
.stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.st { background: #fff; border-radius: 14px; padding: 16px; box-shadow: 0 1px 3px rgba(0,0,0,.1); text-align: center; cursor: pointer; }
.st:active { transform: scale(.98); }
.sv { font-size: 26px; font-weight: 700; color: #0d9488; }
.sl { font-size: 12px; color: #64748b; margin-top: 4px; }
.qa { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
.qb { background: #fff; border: 1px solid #e2e8f0; border-radius: 14px; padding: 14px 8px; text-align: center; cursor: pointer; font-size: 13px; font-weight: 500; }
.qb:active { background: #ccfbf1; }
.ri { background: #fff; border-radius: 12px; padding: 14px; box-shadow: 0 1px 3px rgba(0,0,0,.1); cursor: pointer; margin-bottom: 10px; }
.ri:active { transform: scale(.99); }
.rr { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
.rn { font-weight: 600; font-size: 14px; flex: 1; word-break: break-all; }
.rb { font-size: 11px; padding: 3px 8px; border-radius: 12px; font-weight: 500; white-space: nowrap; }
.bh { background: #dcfce7; color: #166534; }
.bm { background: #fef3c7; color: #92400e; }
.bl { background: #fee2e2; color: #991b1b; }
.bd { background: #dbeafe; color: #1e40af; }
.bo { background: #f3e8ff; color: #7c3aed; }
.bp { background: #0d9488; color: #fff; }
.bs { background: #f8fafc; color: #1e293b; border: 1px solid #e2e8f0; }
.bdg { background: #ef4444; color: #fff; }
.rm { font-size: 12px; color: #64748b; margin-top: 4px; line-height: 1.5; }
.rt { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }
.rt span { font-size: 11px; padding: 2px 8px; border-radius: 10px; background: #f1f5f9; color: #475569; }
.cg { display: flex; gap: 6px; margin-bottom: 10px; flex-wrap: wrap; }
.ch { padding: 6px 12px; border-radius: 16px; border: 1px solid #e2e8f0; font-size: 13px; cursor: pointer; background: #fff; }
.ch.on { background: #0d9488; color: #fff; border-color: #0d9488; }
.sb { margin-bottom: 10px; }
.sb input { width: 100%; padding: 10px 12px; border: 1px solid #e2e8f0; border-radius: 12px; font-size: 14px; background: #f8fafc; }
.ed { display: flex; align-items: flex-start; gap: 8px; padding: 8px 0; border-bottom: 1px solid #f1f5f9; }
.ed:last-child { border-bottom: none; }
.el { font-size: 13px; color: #64748b; min-width: 80px; padding-top: 8px; }
.ei { flex: 1; padding: 8px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 14px; }
.es { flex: 1; padding: 8px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 14px; background: #fff; }
.et { flex: 1; padding: 8px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 14px; min-height: 60px; resize: vertical; }
.ea { flex: 1; display: flex; flex-wrap: wrap; gap: 6px; }
.ea .tag { display: inline-flex; align-items: center; gap: 4px; background: #f1f5f9; padding: 4px 10px; border-radius: 12px; font-size: 13px; }
.ea .tag button { background: none; border: none; color: #64748b; font-size: 16px; line-height: 1; padding: 0; cursor: pointer; }
.btn { width: 100%; padding: 12px; border: none; border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer; }
.btn:active { opacity: .9; }
.btnsm { width: auto; padding: 8px 16px; font-size: 13px; border-radius: 8px; }
.ga { display: flex; gap: 8px; margin-top: 12px; }
.mt { margin-top: 10px; }
.pa { min-height: 120px; font-size: 15px; line-height: 1.6; width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 12px; background: #f8fafc; resize: vertical; }
.ov { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 100; align-items: flex-end; justify-content: center; }
.ov.on { display: flex; }
.ob { background: #fff; width: 100%; max-width: 480px; max-height: 85vh; border-radius: 20px 20px 0 0; padding: 20px; overflow-y: auto; }
.tst { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,.85); color: #fff; padding: 10px 20px; border-radius: 20px; font-size: 13px; opacity: 0; pointer-events: none; transition: opacity .3s; z-index: 200; }
.tst.on { opacity: 1; }
.em { text-align: center; padding: 40px 20px; color: #94a3b8; font-size: 14px; }
.sc { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 20px; color: #64748b; }
.pr { background: #f0fdf4; border-radius: 12px; padding: 14px; margin-bottom: 16px; border: 1px solid #bbf7d0; }
.pi { display: flex; justify-content: space-between; padding: 7px 0; border-bottom: 1px dashed #bbf7d0; font-size: 14px; }
.pi:last-child { border-bottom: none; }
.pl { color: #166534; font-weight: 500; }
.pv { text-align: right; max-width: 60%; word-break: break-all; }
.ai-score { display: flex; align-items: center; gap: 8px; }
.ai-score .score { font-size: 24px; font-weight: 700; color: #0d9488; }
.ai-score .grade { font-size: 12px; padding: 2px 8px; border-radius: 10px; background: #dcfce7; color: #166534; }
.section-title { font-size: 13px; color: #64748b; margin: 16px 0 8px; font-weight: 600; }
.hid { display: none; }
.fu-card { background: #f8fafc; border-radius: 12px; padding: 12px; margin-bottom: 10px; border-left: 4px solid #0d9488; }
.fu-card .fu-title { font-weight: 600; font-size: 14px; margin-bottom: 4px; }
.fu-card .fu-meta { font-size: 12px; color: #64748b; }
.fu-card .fu-action { font-size: 12px; color: #0d9488; margin-top: 6px; }
</style>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
</head><body>
<div id="app"><header><h1 id="ht">Jaycy AI CRM</h1><span id="_sync" onclick="A.exportData()">备份</span></header>
<div id="main"></div>
<nav>
<div class="nav-item active" onclick="A.tab('home')"><span>H</span><span>首页</span></div>
<div class="nav-item" onclick="A.tab('customers')"><span>C</span><span>客户</span></div>
<div class="nav-item" onclick="A.tab('add')"><span>+</span><span>录入</span></div>
<div class="nav-item" onclick="A.tab('settings')"><span>S</span><span>设置</span></div>
</nav></div>
<div id="ov" class="ov" onclick="A.cl()"><div class="ob" onclick="event.stopPropagation()"><div id="ob"></div></div></div>
<div id="tst" class="tst"></div>
<script>
const AI_API_URL = 'https://jaycy-crm-ai.vercel.app/api/ai';

const A = {
  _c: null, _t: 'home', _f: 'all', _ai: null, _mode: 'ai',

  get c() {
    if (!this._c) {
      this._c = this.loadCustomers();
    }
    return this._c;
  },
  set c(v) { this._c = v; this.saveCustomers(v); },

  loadCustomers() {
    try {
      const v = JSON.parse(localStorage.getItem('jc_c_v2'));
      if (v && v.length) return v;
    } catch (e) {}
    // 迁移旧版数据
    return this.migrateOldData();
  },

  saveCustomers(v) {
    localStorage.setItem('jc_c_v2', JSON.stringify(v));
  },

  get deepseekKey() {
    try { return localStorage.getItem('jc_deepseek_key') || ''; } catch (e) { return ''; }
  },
  set deepseekKey(v) {
    localStorage.setItem('jc_deepseek_key', v || '');
  },

  migrateOldData() {
    let out = [];
    try {
      const oldI = JSON.parse(localStorage.getItem('jc_i')) || [];
      const oldO = JSON.parse(localStorage.getItem('jc_o')) || [];
      const now = this.now();
      for (let x of oldI) {
        out.push(this.buildCustomer({
          nickname: x.wechatName || '',
          firstInquiryDate: x.firstInquiryDate || now,
          travelDate: x.plannedTravelDate || '',
          travelDays: x.days || '',
          peopleCount: x.people || '',
          recommendedProduct: x.interestedPackage || '',
          status: '新咨询',
          aiGrade: x.intentionLevel === '高' ? 'A' : x.intentionLevel === '中' ? 'B' : 'C',
          chatHistory: x.followUp1 || '',
          followUpLogs: [x.followUp1, x.followUp2, x.followUp3].filter(Boolean),
          createdAt: now,
          updatedAt: now
        }));
      }
      for (let x of oldO) {
        out.push(this.buildCustomer({
          nickname: x.customerInfo || '',
          contact: x.contact || '',
          travelDate: x.travelDate || '',
          peopleCount: x.people || '',
          recommendedProduct: x.product || '',
          roomType: x.roomType || '',
          status: '已成交',
          outcome: '成交',
          totalPrice: x.totalPrice || '',
          paymentMethod: x.paymentMethod || '',
          paymentStatus: x.paymentStatus || '',
          finalDate: x.finalDate || '',
          notes: x.notes || '',
          createdAt: x.groupDate || now,
          updatedAt: now
        }));
      }
    } catch (e) {}
    return out;
  },

  buildCustomer(overrides) {
    const now = this.now();
    return Object.assign({
      id: 'c_' + Date.now() + '_' + Math.random().toString(36).slice(2, 7),
      nickname: '', contact: '', firstInquiryDate: now,
      travelDate: '', travelDays: '', peopleCount: '', relationship: '',
      ticketStatus: '', visaStatus: '', decisionMaker: '', budget: '',
      tags: [], aiScore: 0, aiGrade: '', concerns: [],
      recommendedProduct: '', recommendedReason: '', alternativeProducts: [],
      followUpTime: '', followUpReason: '', followUpContent: '', followUpScript: '',
      lastContactDate: '', nextFollowUpDate: '', status: '新咨询', outcome: '', lostReason: '',
      chatHistory: '', followUpLogs: [], createdAt: now, updatedAt: now
    }, overrides || {});
  },

  now() { return new Date().toISOString().split('T')[0]; },

  es(s) { return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); },
  tm(m) { let t = document.getElementById('tst'); t.textContent = m; t.classList.add('on'); setTimeout(() => t.classList.remove('on'), 2500); },
  cl() { document.getElementById('ov').classList.remove('on'); },

  tab(t) {
    this._t = t; this._f = 'all';
    document.querySelectorAll('.nav-item').forEach((n, i) => n.classList.toggle('active', (i === 0 && t === 'home') || (i === 1 && t === 'customers') || (i === 2 && t === 'add') || (i === 3 && t === 'settings')));
    document.getElementById('ht').textContent = { home: 'Jaycy AI CRM', customers: '客户库', add: '录入', settings: '设置' }[t] || 'Jaycy AI CRM';
    if (t === 'home') this.home(); else if (t === 'customers') this.custList(); else if (t === 'add') this.addScreen(); else if (t === 'settings') this.settings();
    document.getElementById('main').scrollTop = 0;
  },

  home() {
    const td = this.now();
    const todayFollow = this.c.filter(x => x.nextFollowUpDate && x.nextFollowUpDate <= td && x.outcome !== '成交' && x.outcome !== '流失').sort((a, b) => a.nextFollowUpDate.localeCompare(b.nextFollowUpDate));
    const total = this.c.length;
    const high = this.c.filter(x => x.aiGrade === 'A').length;
    const deal = this.c.filter(x => x.outcome === '成交').length;
    const lost = this.c.filter(x => x.outcome === '流失').length;

    let h = '<div class="qa"><div class="qb" onclick="A.tab(\'add\')">AI 录入</div><div class="qb" onclick="A.tab(\'customers\')">客户库</div></div>';
    h += '<div class="card"><div class="card-title">今日待跟进</div>';
    if (todayFollow.length === 0) h += '<div class="em">今天没有待跟进客户</div>';
    else {
      for (let x of todayFollow) {
        h += this.renderFollowCard(x);
      }
    }
    h += '</div>';
    h += '<div class="card"><div class="card-title">销售概览</div><div class="stats">';
    h += '<div class="st" onclick="A.tab(\'customers\')"><div class="sv">' + total + '</div><div class="sl">总客户</div></div>';
    h += '<div class="st" onclick="A.filterGrade(\'A\')"><div class="sv">' + high + '</div><div class="sl">高意向</div></div>';
    h += '<div class="st" onclick="A.filterOutcome(\'成交\')"><div class="sv">' + deal + '</div><div class="sl">已成交</div></div>';
    h += '<div class="st" onclick="A.filterOutcome(\'流失\')"><div class="sv">' + lost + '</div><div class="sl">已流失</div></div>';
    h += '</div></div>';
    document.getElementById('main').innerHTML = h;
  },

  renderFollowCard(x) {
    const last = x.lastContactDate ? '上次联系：' + x.lastContactDate : '暂无联系记录';
    return '<div class="fu-card" onclick="A.showCust(\'' + x.id + '\')">' +
      '<div class="fu-title">' + this.es(x.nickname || '未命名') + '<span class="rb ' + this.gradeClass(x.aiGrade) + '" style="margin-left:8px">' + (x.aiGrade || '-') + '</span></div>' +
      '<div class="fu-meta">' + this.es(x.followUpReason || '待跟进') + ' · ' + last + '</div>' +
      '<div class="fu-action">建议：' + this.es(x.followUpContent || '联系客户') + '</div>' +
      '</div>';
  },

  gradeClass(g) { return g === 'A' ? 'bh' : g === 'B' ? 'bm' : g === 'C' ? 'bl' : 'bo'; },

  custList() {
    const self = this;
    const s = (document.getElementById('_search') || {}).value || '';
    const f = this._f;
    let list = this.c.filter(x => {
      if (f === 'A' && x.aiGrade !== 'A') return false;
      if (f === 'B' && x.aiGrade !== 'B') return false;
      if (f === 'C' && x.aiGrade !== 'C') return false;
      if (f === 'D' && x.aiGrade !== 'D') return false;
      if (f === 'deal' && x.outcome !== '成交') return false;
      if (f === 'lost' && x.outcome !== '流失') return false;
      if (f === 'today' && x.nextFollowUpDate !== this.now()) return false;
      const t = (x.nickname + ' ' + x.contact + ' ' + x.recommendedProduct + ' ' + x.tags.join(' ')).toLowerCase();
      return t.indexOf(s.toLowerCase()) >= 0;
    });
    list.sort((a, b) => (b.aiScore || 0) - (a.aiScore || 0));

    let h = '<div class="qa"><div class="qb" onclick="A.tab(\'add\')">新增客户</div><div class="qb" onclick="A.exportData()">导出</div></div>';
    h += '<div class="sb"><input id="_search" placeholder="搜索客户/产品/标签" value="' + self.es(s) + '" oninput="A.custList()"></div>';
    h += '<div class="cg">';
    const filters = [['all', '全部'], ['A', 'A级'], ['B', 'B级'], ['C', 'C级'], ['D', 'D级'], ['today', '今日'], ['deal', '成交'], ['lost', '流失']];
    for (let [k, l] of filters) h += '<span class="ch' + (f === k ? ' on' : '') + '" onclick="A.custFilter(\'' + k + '\')">' + l + '</span>';
    h += '</div>';
    if (list.length === 0) h += '<div class="em">没有客户记录</div>';
    else {
      for (let x of list) h += this.renderCustItem(x);
    }
    document.getElementById('main').innerHTML = h;
  },

  renderCustItem(x) {
    const tags = x.tags.slice(0, 3).map(t => '<span>' + this.es(t) + '</span>').join('');
    const badge = x.outcome === '成交' ? 'bd' : x.outcome === '流失' ? 'bdg' : this.gradeClass(x.aiGrade);
    const badgeText = x.outcome === '成交' ? '成交' : x.outcome === '流失' ? '流失' : (x.aiGrade || '未评分');
    return '<div class="ri" onclick="A.showCust(\'' + x.id + '\')">' +
      '<div class="rr"><div class="rn">' + this.es(x.nickname || '未命名') + '</div><span class="rb ' + badge + '">' + badgeText + '</span></div>' +
      '<div class="rm">' + this.es(x.travelDate || '时间待定') + ' · ' + this.es(x.peopleCount || '人数待定') + ' · ' + this.es(x.recommendedProduct || '产品待定') + '</div>' +
      '<div class="rt">' + tags + '</div>' +
      '</div>';
  },

  custFilter(f) { this._f = f; this.custList(); },
  filterGrade(g) { this._f = g; this.tab('customers'); },
  filterOutcome(o) { this._f = o === '成交' ? 'deal' : 'lost'; this.tab('customers'); },

  addScreen() {
    let h = '<div class="cg"><span class="ch ' + (this._mode === 'ai' ? 'on' : '') + '" onclick="A.setMode(\'ai\')">AI 粘贴</span><span class="ch ' + (this._mode === 'manual' ? 'on' : '') + '" onclick="A.setMode(\'manual\')">手动录入</span></div>';
    if (this._mode === 'ai') {
      h += '<div class="card"><div class="card-title">AI 解析聊天记录</div><textarea class="pa" id="_paste" placeholder="把客户聊天记录粘贴到这里，或点击下方上传聊天截图，AI 会自动提取客户信息、评分、跟进建议..." onpaste="A.handlePaste(event)"></textarea>';
      h += '<div class="img-up" onclick="A.pickImage()"><span>📷 上传聊天截图</span></div>';
      h += '<input type="file" id="_imgInput" accept="image/*" class="hid" onchange="A.handleImage(this)" multiple>';
      h += '<div id="_imgPreview" class="img-preview"></div>';
      h += '</div>';
      h += '<button class="btn bp" onclick="A.aiParse()">AI 解析</button>';
      h += '<div id="_aiResult" class="hid"></div>';
    } else {
      h += '<div class="card"><div class="card-title">手动录入客户</div>';
      const fields = [
        ['nickname', '昵称'], ['contact', '联系方式'], ['travelDate', '出行日期'], ['travelDays', '天数'], ['peopleCount', '人数'],
        ['relationship', '关系'], ['ticketStatus', '机票状态'], ['visaStatus', '签证状态'], ['decisionMaker', '决策人'], ['budget', '预算']
      ];
      for (let [k, l] of fields) h += '<div class="ed"><span class="el">' + l + '</span><input class="ei" id="_m_' + k + '"></div>';
      h += '</div><button class="btn bp" onclick="A.saveManual()">保存</button>';
    }
    document.getElementById('main').innerHTML = h;
  },

  setMode(m) { this._mode = m; this.addScreen(); },

  pickImage() { document.getElementById('_imgInput').click(); },

  handlePaste(e) {
    const items = e.clipboardData && e.clipboardData.items;
    if (!items) return;
    const files = [];
    for (let item of items) {
      if (item.kind === 'file' && item.type.indexOf('image') !== -1) {
        const file = item.getAsFile();
        if (file) files.push(file);
      }
    }
    if (files.length) {
      e.preventDefault();
      this.ocrImages(files);
    }
  },

  handleImage(input) {
    const files = Array.from(input.files || []);
    if (!files.length) return;
    input.value = '';
    this.ocrImages(files);
  },

  renderImagePreview(files, statusMap) {
    const box = document.getElementById('_imgPreview');
    let h = '';
    for (let i = 0; i < files.length; i++) {
      const url = URL.createObjectURL(files[i]);
      const status = statusMap && statusMap[i] ? statusMap[i] : '识别中...';
      h += '<div class="img-thumb"><img src="' + url + '"><span class="img-status">' + this.es(status) + '</span></div>';
    }
    box.innerHTML = h;
  },

  async ocrImages(files) {
    if (!window.Tesseract) {
      document.getElementById('_imgPreview').innerHTML = '<div class="img-error">OCR 库未加载，请检查网络</div>';
      return;
    }
    const preview = document.getElementById('_imgPreview');
    const statusMap = files.map(() => '识别中...');
    this.renderImagePreview(files, statusMap);

    const paste = document.getElementById('_paste');
    let ocrParts = [];
    let worker = null;
    try {
      const status = document.createElement('div');
      status.className = 'ocr-status';
      status.innerHTML = '<span>⏳ 正在加载 OCR 引擎，首次使用需下载语言包...</span>';
      preview.parentElement.insertBefore(status, preview.nextSibling);

      worker = await Tesseract.createWorker('chi_sim+eng');
      status.remove();

      for (let i = 0; i < files.length; i++) {
        statusMap[i] = '识别中...';
        this.renderImagePreview(files, statusMap);
        const { data: { text } } = await worker.recognize(files[i]);
        statusMap[i] = '已识别';
        this.renderImagePreview(files, statusMap);
        const clean = (text || '').trim();
        if (clean) {
          ocrParts.push('[图片识别内容' + (files.length > 1 ? ' ' + (i + 1) : '') + ']\n' + clean);
        }
      }
      await worker.terminate();

      if (ocrParts.length) {
        const current = paste.value.trim();
        const insert = ocrParts.join('\n\n');
        paste.value = current ? current + '\n\n' + insert : insert;
      }

      setTimeout(() => {
        document.getElementById('_imgPreview').innerHTML = '';
      }, 2000);
      this.tm('图片文字识别完成');
    } catch (e) {
      console.error('OCR error:', e);
      preview.innerHTML = '<div class="img-error">识别失败：' + this.es(e.message || '请检查网络或图片格式') + '</div>';
      if (worker) { try { await worker.terminate(); } catch (err) {} }
    }
  },

  async aiParse() {
    const text = document.getElementById('_paste').value.trim();
    if (!text) { this.tm('请先粘贴聊天记录或上传截图'); return; }
    const box = document.getElementById('_aiResult');
    box.classList.remove('hid');
    box.innerHTML = '<div class="sc">AI 解析中...</div>';
    try {
      let data;
      const key = this.deepseekKey;
      if (key) {
        data = await this.callDeepSeekDirect(text, key);
      } else {
        const res = await fetch(AI_API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: 'parseChat', text })
        });
        data = await res.json();
      }
      this._ai = this.mapAiResult(data, text);
      box.innerHTML = this.renderAiResult(this._ai);
    } catch (e) {
      box.innerHTML = '<div class="em">AI 解析失败：' + this.es(e.message || '请检查网络或 API 配置') + '</div><div style="font-size:12px;color:#64748b;margin-top:8px">提示：可在设置页填入 DeepSeek API Key，开启浏览器直连模式</div>';
      console.error(e);
    }
  },

  async callDeepSeekDirect(text, key) {
    const systemPrompt = `你是一名资深的西澳旅游销售专家，擅长从客户聊天记录中提取关键信息并给出销售建议。\n\n任务：分析下面这段销售聊天记录，输出一个严格的 JSON 对象。不要添加任何解释、注释或 Markdown 代码块，只输出 JSON。\n\n必须严格使用以下英文键名和结构：\n{\n  \"basicInfo\": {\n    \"nickname\": \"客户昵称或微信名，没有就空字符串\",\n    \"contact\": \"联系电话，没有就空字符串\",\n    \"travelDate\": \"出行日期，如 2026.8.1，没有就空字符串\",\n    \"travelDays\": \"出行天数，没有就空字符串\",\n    \"peopleCount\": \"人数，没有就空字符串\",\n    \"relationship\": \"家庭游/亲子游/情侣游/夫妻游/朋友游/独自出行/未知，没有就空字符串\"\n  },\n  \"travelStatus\": {\n    \"ticket\": \"已购买/正在购买/未购买/未知，没有就空字符串\",\n    \"visa\": \"已办理/办理中/未办理/未知，没有就空字符串\"\n  },\n  \"decisionMaker\": \"本人/夫妻共同决定/家庭共同决定/朋友共同决定/未知，没有就空字符串\",\n  \"budget\": \"经济型/性价比型/舒适型/高端型/未知，没有就空字符串\",\n  \"tags\": [\"#家庭游\", \"#第一次来西澳\", \"#高意向\"],\n  \"score\": 85,\n  \"grade\": \"A/B/C/D\",\n  \"concerns\": [\"价格敏感\", \"等机票\"],\n  \"recommendedProduct\": {\n    \"name\": \"根据客户兴趣和出行情况推荐的主推产品，如全景七日/明星六日/粉湖轻奢两日游，没有就空字符串\",\n    \"reason\": \"一句话说明为什么推荐\"\n  },\n  \"alternativeProducts\": [\n    {\"name\": \"备选产品名称\", \"reason\": \"适合什么情况\"}\n  ],\n  \"followUp\": {\n    \"time\": \"7天后联系/14天后联系/30天后联系\",\n    \"reason\": \"等待机票/等待人数确定/等待签证/等同行人决定/等签证\",\n    \"content\": \"具体要跟客户分享什么，如分享野花季视频/提醒旺季位置紧张/提醒机票价格波动\",\n    \"script\": \"一段完整、自然、亲切的中文跟进话术，可以直接复制发给客户\"\n  }\n}\n\n评分规则（0-100分）：\n- 已确定出行时间：+20\n- 已买机票：+20\n- 人数明确：+15\n- 主动询价/积极回复：+15\n- 预算明确：+10\n- 主动索要资料/行程：+5\n- 有明确出行意愿：+15\n\n等级规则：\n- 80-100：A（高意向）\n- 60-79：B（中意向）\n- 40-59：C（低意向）\n- 40以下：D（长期培育）\n\n注意事项：\n1. 必须使用上述英文键名，不要使用中文字段名。\n2. 如果聊天记录中没有明确信息，对应字段留空字符串，不要猜测。\n3. tags 数组根据客户特征生成，如 #家庭游、#第一次来西澳、#高意向、#9月出行。\n4. recommendedProduct 和 alternativeProducts 必须根据客户提到的兴趣或西澳旅游产品来推荐。\n5. followUp.script 必须是一段完整、可直接发送的中文话术，不要只写'推荐话术'四个字。\n6. 只输出 JSON，不要任何其他文字。`;
    const res = await fetch('https://api.deepseek.com/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + key },
      body: JSON.stringify({
        model: 'deepseek-chat',
        messages: [
          { role: 'system', content: systemPrompt },
          { role: 'user', content: text }
        ],
        temperature: 0.2
      })
    });
    const json = await res.json();
    if (!res.ok) throw new Error(json.error?.message || 'DeepSeek API 错误');
    const raw = (json.choices?.[0]?.message?.content || '{}').trim();
    const clean = raw.replace(/^\`\`\`json\s*/, '').replace(/\s*\`\`\`$/, '');
    return JSON.parse(clean);
  },

  mapAiResult(data, text) {
    const b = data.basicInfo || {};
    const t = data.travelStatus || {};
    const f = data.followUp || {};
    const r = data.recommendedProduct || {};
    const today = this.now();
    const nextDate = this.addDays(today, f.time && f.time.match(/\d+/) ? parseInt(f.time.match(/\d+/)[0]) : 7);
    return this.buildCustomer({
      nickname: b.nickname || '',
      contact: b.contact || '',
      travelDate: b.travelDate || '',
      travelDays: b.travelDays || '',
      peopleCount: b.peopleCount || '',
      relationship: b.relationship || '',
      ticketStatus: t.ticket || '',
      visaStatus: t.visa || '',
      decisionMaker: data.decisionMaker || '',
      budget: data.budget || '',
      tags: data.tags || [],
      aiScore: data.score || 0,
      aiGrade: data.grade || '',
      concerns: data.concerns || [],
      recommendedProduct: r.name || '',
      recommendedReason: r.reason || '',
      alternativeProducts: data.alternativeProducts || [],
      followUpTime: f.time || '',
      followUpReason: f.reason || '',
      followUpContent: f.content || '',
      followUpScript: f.script || '',
      lastContactDate: today,
      nextFollowUpDate: nextDate,
      status: '新咨询',
      chatHistory: text
    });
  },

  addDays(d, n) {
    const date = new Date(d);
    date.setDate(date.getDate() + n);
    return date.toISOString().split('T')[0];
  },

  renderAiResult(d) {
    let h = '<div class="card"><div class="card-title">AI 识别结果</div>';
    h += '<div class="ai-score"><span class="score">' + (d.aiScore || 0) + '</span><span class="grade">' + (d.aiGrade || '-') + '级</span></div>';
    const rows = [
      ['昵称', d.nickname], ['联系方式', d.contact], ['出行日期', d.travelDate], ['天数', d.travelDays], ['人数', d.peopleCount],
      ['关系', d.relationship], ['机票', d.ticketStatus], ['签证', d.visaStatus], ['决策人', d.decisionMaker], ['预算', d.budget],
      ['主推产品', d.recommendedProduct + (d.recommendedReason ? '（' + d.recommendedReason + '）' : '')],
      ['顾虑', d.concerns.join('，')], ['跟进建议', d.followUpTime + ' · ' + d.followUpContent]
    ];
    for (let [l, v] of rows) h += '<div class="pi"><span class="pl">' + l + '</span><span class="pv">' + this.es(v) + '</span></div>';
    h += '<div class="ga mt"><button class="btn bp" onclick="A.saveAiResult()">确认保存</button></div></div>';
    return h;
  },

  saveAiResult() {
    if (!this._ai) return;
    this.c = [this._ai].concat(this.c);
    this._ai = null;
    this.tm('已保存到客户库');
    this.tab('customers');
  },

  saveManual() {
    const fields = ['nickname', 'contact', 'travelDate', 'travelDays', 'peopleCount', 'relationship', 'ticketStatus', 'visaStatus', 'decisionMaker', 'budget'];
    const d = this.buildCustomer({});
    for (let k of fields) d[k] = document.getElementById('_m_' + k).value.trim();
    this.c = [d].concat(this.c);
    this.tm('已保存');
    this.tab('customers');
  },

  showCust(id) {
    const x = this.c.find(a => a.id === id);
    if (!x) return;
    let h = '<div style="display:flex;justify-content:space-between;margin-bottom:16px"><b>客户详情</b><span class="ov-close" onclick="A.cl()">&times;</span></div>';
    h += '<div class="ai-score"><span class="score">' + (x.aiScore || 0) + '</span><span class="grade rb ' + this.gradeClass(x.aiGrade) + '">' + (x.aiGrade || '-') + '级</span></div>';
    const sections = [
      ['基础信息', [['昵称', x.nickname], ['联系方式', x.contact], ['首询日期', x.firstInquiryDate], ['出行日期', x.travelDate], ['天数', x.travelDays], ['人数', x.peopleCount], ['关系', x.relationship]]],
      ['出行状态', [['机票', x.ticketStatus], ['签证', x.visaStatus]]],
      ['决策与预算', [['决策人', x.decisionMaker], ['预算', x.budget]]],
      ['AI 分析', [['标签', (x.tags || []).join('，')], ['顾虑', (x.concerns || []).join('，')], ['主推产品', x.recommendedProduct + (x.recommendedReason ? '（' + x.recommendedReason + '）' : '')], ['跟进时间', x.followUpTime], ['跟进原因', x.followUpReason], ['跟进内容', x.followUpContent]]]
    ];
    for (let [title, rows] of sections) {
      h += '<div class="section-title">' + title + '</div>';
      for (let [l, v] of rows) h += '<div class="ed"><span class="el">' + l + '</span><span>' + this.es(v) + '</span></div>';
    }
    if (x.followUpScript) {
      h += '<div class="section-title">推荐话术</div><div class="card" style="background:#f8fafc">' + this.es(x.followUpScript).replace(/\n/g, '<br>') + '</div>';
    }
    if (x.notes || x.chatHistory) {
      h += '<div class="section-title">备注/聊天记录</div><div class="card" style="background:#f8fafc;font-size:13px;line-height:1.6">' + this.es(x.notes || x.chatHistory).replace(/\n/g, '<br>') + '</div>';
    }
    h += '<div class="ga mt"><button class="btn bp" onclick="A.editCust(A.c.find(function(a){return a.id===\'' + x.id + '\'}))">编辑</button><button class="btn bdg" onclick="A.delCust(\'' + x.id + '\')">删除</button></div>';
    document.getElementById('ob').innerHTML = h;
    document.getElementById('ov').classList.add('on');
  },

  editCust(d) {
    if (!d) return;
    const fields = [
      ['nickname', '昵称'], ['contact', '联系方式'], ['travelDate', '出行日期'], ['travelDays', '天数'], ['peopleCount', '人数'],
      ['relationship', '关系'], ['ticketStatus', '机票状态'], ['visaStatus', '签证状态'], ['decisionMaker', '决策人'], ['budget', '预算'],
      ['recommendedProduct', '主推产品'], ['recommendedReason', '推荐理由'], ['followUpTime', '跟进时间'], ['followUpReason', '跟进原因'], ['followUpContent', '跟进内容'], ['followUpScript', '跟进话术']
    ];
    let h = '<div style="display:flex;justify-content:space-between;margin-bottom:16px"><b>编辑客户</b><span class="ov-close" onclick="A.cl()">&times;</span></div>';
    for (let [k, l] of fields) h += '<div class="ed"><span class="el">' + l + '</span><input class="ei" id="_e_' + k + '" value="' + this.es(d[k]) + '"></div>';
    h += '<div class="ed"><span class="el">AI 评分</span><input class="ei" id="_e_aiScore" value="' + this.es(d.aiScore) + '" type="number"></div>';
    h += '<div class="ed"><span class="el">AI 等级</span><select class="es" id="_e_aiGrade"><option value="">无</option><option value="A"' + (d.aiGrade === 'A' ? ' selected' : '') + '>A</option><option value="B"' + (d.aiGrade === 'B' ? ' selected' : '') + '>B</option><option value="C"' + (d.aiGrade === 'C' ? ' selected' : '') + '>C</option><option value="D"' + (d.aiGrade === 'D' ? ' selected' : '') + '>D</option></select></div>';
    h += '<div class="ed"><span class="el">销售状态</span><select class="es" id="_e_status"><option value="新咨询"' + (d.status === "新咨询" ? ' selected' : '') + '>新咨询</option><option value="已报价"' + (d.status === "已报价" ? ' selected' : '') + '>已报价</option><option value="高意向"' + (d.status === "高意向" ? ' selected' : '') + '>高意向</option><option value="待付款"' + (d.status === "待付款" ? ' selected' : '') + '>待付款</option><option value="已成交"' + (d.status === "已成交" ? ' selected' : '') + '>已成交</option><option value="已流失"' + (d.status === "已流失" ? ' selected' : '') + '>已流失</option></select></div>';
    h += '<div class="ed"><span class="el">最终结果</span><select class="es" id="_e_outcome"><option value=""' + (d.outcome === "" ? ' selected' : '') + '>未结案</option><option value="成交"' + (d.outcome === "成交" ? ' selected' : '') + '>成交</option><option value="流失"' + (d.outcome === "流失" ? ' selected' : '') + '>流失</option></select></div>';
    h += '<div class="ed"><span class="el">流失原因</span><input class="ei" id="_e_lostReason" value="' + this.es(d.lostReason) + '"></div>';
    h += '<div class="ed"><span class="el">下次跟进</span><input class="ei" id="_e_nextFollowUpDate" value="' + this.es(d.nextFollowUpDate) + '" type="date"></div>';
    h += '<div class="ed"><span class="el">标签</span><div class="ea" id="_e_tags">' + this.renderTagEditor(d.tags || []) + '</div></div>';
    h += '<div class="ed"><span class="el">备注</span><textarea class="et" id="_e_notes">' + this.es(d.notes || d.chatHistory) + '</textarea></div>';
    h += '<div class="ga mt"><button class="btn bp" onclick="A.saveCust(\'' + d.id + '\')">保存</button></div>';
    document.getElementById('ob').innerHTML = h;
    document.getElementById('ov').classList.add('on');
  },

  renderTagEditor(tags) {
    let h = '<input class="ei" id="_e_tagInput" placeholder="输入标签回车" style="flex:0 0 auto;min-width:80px" onkeydown="if(event.key===\'Enter\'){A.addTag();event.preventDefault()}">';
    for (let t of tags) h += '<span class="tag">' + this.es(t) + '<button onclick="A.removeTag(this)">&times;</button></span>';
    return h;
  },

  addTag() {
    const input = document.getElementById('_e_tagInput');
    const val = input.value.trim();
    if (!val) return;
    const tags = this.getTagsFromEditor();
    if (!tags.includes(val)) tags.push(val);
    document.getElementById('_e_tags').innerHTML = this.renderTagEditor(tags);
  },

  removeTag(btn) {
    const tags = this.getTagsFromEditor();
    const idx = Array.from(btn.parentElement.parentElement.children).indexOf(btn.parentElement) - 1;
    tags.splice(idx, 1);
    document.getElementById('_e_tags').innerHTML = this.renderTagEditor(tags);
  },

  getTagsFromEditor() {
    const tags = [];
    document.querySelectorAll('#_e_tags .tag').forEach(el => {
      const text = el.childNodes[0].textContent;
      if (text) tags.push(text);
    });
    return tags;
  },

  saveCust(id) {
    const idx = this.c.findIndex(a => a.id === id);
    if (idx < 0) return;
    const d = this.c[idx];
    const fields = ['nickname', 'contact', 'travelDate', 'travelDays', 'peopleCount', 'relationship', 'ticketStatus', 'visaStatus', 'decisionMaker', 'budget', 'recommendedProduct', 'recommendedReason', 'followUpTime', 'followUpReason', 'followUpContent', 'followUpScript'];
    for (let k of fields) d[k] = document.getElementById('_e_' + k).value.trim();
    d.aiScore = parseInt(document.getElementById('_e_aiScore').value) || 0;
    d.aiGrade = document.getElementById('_e_aiGrade').value;
    d.status = document.getElementById('_e_status').value;
    d.outcome = document.getElementById('_e_outcome').value;
    d.lostReason = document.getElementById('_e_lostReason').value.trim();
    d.nextFollowUpDate = document.getElementById('_e_nextFollowUpDate').value;
    d.tags = this.getTagsFromEditor();
    d.notes = document.getElementById('_e_notes').value.trim();
    d.updatedAt = this.now();
    this.c = this.c.slice(); // trigger setter
    this.cl();
    this.tm('已保存');
    if (this._t === 'customers') this.custList(); else this.home();
  },

  delCust(id) {
    if (!confirm('确定删除？')) return;
    this.c = this.c.filter(a => a.id !== id);
    this.cl();
    this.tm('已删除');
    if (this._t === 'customers') this.custList(); else this.home();
  },

  settings() {
    let h = '<div class="card"><div class="card-title">设置</div>';
    h += '<div class="ed"><span class="el">DeepSeek Key</span><input class="ei" id="_deepseekKey" type="password" value="' + this.es(this.deepseekKey) + '" placeholder="sk-...（浏览器本地存储）" onchange="A.saveDeepseekKey()"></div>';
    h += '<div style="font-size:12px;color:#64748b;margin:8px 0">填入 Key 后，AI 解析会直接调用 DeepSeek，无需 Vercel 代理</div>';
    h += '<div class="ed"><span class="el">AI 接口</span><input class="ei" id="_aiUrl" value="' + this.es(AI_API_URL) + '" readonly></div>';
    h += '<button class="btn bp mt" onclick="A.saveDeepseekKey()">保存 Key</button>';
    h += '<button class="btn bs mt" onclick="A.exportData()">导出备份 JSON</button>';
    h += '<button class="btn bs mt" onclick="A.importData()">导入备份 JSON</button>';
    h += '<button class="btn bdg mt" onclick="A.clearData()">清空所有数据</button>';
    h += '</div>';
    document.getElementById('main').innerHTML = h;
  },

  saveDeepseekKey() {
    const key = document.getElementById('_deepseekKey').value.trim();
    this.deepseekKey = key;
    this.tm(key ? '已保存 DeepSeek Key' : '已清除 DeepSeek Key');
  },

  exportData() {
    const data = JSON.stringify({ c: this.c, version: '2.0', exportedAt: new Date().toISOString() }, null, 2);
    const blob = new Blob([data], { type: 'application/json' });
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'jaycy-crm-backup-' + this.now() + '.json'; document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(a.href);
    this.tm('备份已导出');
  },

  importData() {
    const input = document.createElement('input'); input.type = 'file'; input.accept = '.json';
    input.onchange = e => {
      const file = e.target.files[0]; if (!file) return;
      const reader = new FileReader();
      reader.onload = ev => {
        try {
          const data = JSON.parse(ev.target.result);
          if (data.c && Array.isArray(data.c)) { this.c = data.c; this.tm('导入成功'); this.tab('home'); }
          else this.tm('格式错误');
        } catch (err) { this.tm('导入失败'); }
      };
      reader.readAsText(file);
    };
    input.click();
  },

  clearData() {
    if (!confirm('确定清空所有数据？不可恢复！')) return;
    this.c = [];
    this.tab('home');
    this.tm('已清空');
  }
};

A.tab('home');
</script>
</body></html>
